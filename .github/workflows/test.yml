on: push

name: Checkout and Test

jobs:
  test:
    name: Checkout and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.3.4

      - name: Set up JRE 14
        uses: actions/setup-java@v1.4.3
        with:
          java-version: '14'

      - name: Build with gradle
        run: gradle test
